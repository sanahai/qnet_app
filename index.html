<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>큐넷 자격증 시험일정</title>
<link rel="manifest" href="manifest.json" />
<link rel="icon" href="icons/icon-192.png" />
<link rel="apple-touch-icon" href="icons/icon-180.png" />
<meta name="theme-color" content="#2563eb" />

<style>
  :root {
    --bg: #f6f7f9;
    --card: #ffffff;
    --border: #e3e6ea;
    --text: #1f2430;
    --muted: #6b7280;
    --accent: #2563eb;
    --accent-soft: #eaf1ff;
    --danger: #dc2626;
    --danger-soft: #fdeaea;
    --ok: #16a34a;
    --ok-soft: #e9f9ee;
  }
  * { box-sizing: border-box; }
  html, body {
    max-width: 100%;
    overflow-x: hidden;
  }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Malgun Gothic", sans-serif;
    background: var(--bg);
    color: var(--text);
  }
  .page {
    max-width: 880px;
    margin: 0 auto;
    background: var(--card);
    min-height: 100vh;
    box-shadow: 0 0 0 1px var(--border);
    overflow-x: hidden;
  }
  header {
    padding: 32px 24px 26px;
    background: linear-gradient(135deg, #2563eb, #1d4ed8);
    text-align: center;
  }
  header h1 {
    margin: 0 0 6px;
    font-size: 22px;
    color: #fff;
    font-weight: 800;
  }
  header p {
    margin: 0;
    color: rgba(255,255,255,0.85);
    font-size: 13px;
  }
  #meta-banner {
    margin-top: 10px;
    font-size: 12px;
    color: rgba(255,255,255,0.75);
  }
  #error-banner {
    display: none;
    margin: 16px 28px 0;
    padding: 12px 16px;
    background: var(--danger-soft);
    color: var(--danger);
    border-radius: 8px;
    font-size: 13px;
    line-height: 1.6;
  }
  .controls {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    padding: 16px 28px;
    background: var(--card);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 5;
  }
  .controls input[type="text"] {
    flex: 1;
    min-width: 200px;
    padding: 9px 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 14px;
  }
  .controls select {
    padding: 9px 10px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 14px;
    background: white;
  }
  .controls label.chip {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 13px;
    color: var(--muted);
    cursor: pointer;
  }
  main {
    padding: 20px 28px 60px;
  }
  #search-hint {
    display: none;
    margin: -8px 0 16px;
    padding: 10px 14px;
    background: var(--accent-soft);
    color: var(--accent);
    border-radius: 8px;
    font-size: 12px;
    line-height: 1.6;
  }
  #stats {
    display: flex;
    gap: 12px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  .stat-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 18px;
    font-size: 13px;
    color: var(--muted);
  }
  .stat-card b {
    display: block;
    font-size: 20px;
    color: var(--text);
    margin-top: 2px;
  }
  .cards {
    display: grid;
    gap: 12px;
  }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 18px;
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 10px;
    align-items: start;
  }
  .card .title-row {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }
  .badge {
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 999px;
    background: var(--accent-soft);
    color: var(--accent);
    font-weight: 600;
    white-space: nowrap;
  }
  .card h3 {
    margin: 0;
    font-size: 15px;
  }
  .card .desc {
    color: var(--text);
    font-size: 16px;
    font-weight: 700;
    margin-top: 2px;
  }
  .timeline {
    margin-top: 10px;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    font-size: 12px;
  }
  .tl-item {
    padding: 6px 10px;
    border-radius: 8px;
    background: #f3f4f6;
    color: var(--text);
  }
  .tl-item .lbl {
    color: var(--muted);
    margin-right: 4px;
  }
  .phase-boxes {
    margin-top: 10px;
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 12px;
  }
  .phase-box {
    flex: 1 1 220px;
    min-width: 220px;
    max-width: 300px;
    border-radius: 10px;
    padding: 12px 16px;
    font-size: 12px;
    border: 1px solid transparent;
  }
  .phase-box.phase-empty {
    background: #f3f4f6;
    color: var(--muted);
    flex: none;
  }
  /* 지난 일정(더 이상 다가오는 날짜가 없는 단계)은 무채색으로,
     아직 시작 전/진행중인(다가오는 날짜가 있는) 단계는 파란 박스로 강조한다. */
  .phase-upcoming {
    background: var(--accent-soft);
    border-color: #cfe0ff;
  }
  .phase-past {
    background: #f3f4f6;
    border-color: var(--border);
  }
  .phase-title {
    font-weight: 700;
    margin-bottom: 8px;
    font-size: 14px;
  }
  .phase-upcoming .phase-title { color: var(--accent); }
  .phase-past .phase-title { color: var(--muted); }
  .phase-row {
    display: flex;
    justify-content: space-between;
    gap: 10px;
    padding: 3px 0;
    white-space: nowrap;
  }
  .phase-row .phase-label {
    color: var(--muted);
    white-space: nowrap;
  }
  .phase-row .phase-value {
    font-weight: 600;
    text-align: right;
    white-space: nowrap;
  }
  .dday {
    text-align: right;
    white-space: nowrap;
  }
  .dday .num {
    font-size: 22px;
    font-weight: 700;
  }
  .dday .sub {
    font-size: 11px;
    color: var(--muted);
  }
  .dday.soon .num { color: var(--danger); }
  .dday.ok .num { color: var(--ok); }
  .dday.past .num { color: var(--muted); }
  #empty {
    text-align: center;
    color: var(--muted);
    padding: 60px 0;
    display: none;
  }
  footer {
    text-align: center;
    color: var(--muted);
    font-size: 12px;
    padding: 20px;
  }
  footer a { color: var(--accent); }
  footer .links { margin-top: 6px; }
  footer .links a { margin: 0 6px; }

  .ad-slot {
    background: var(--card);
    border: 1px dashed var(--border);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--muted);
    font-size: 12px;
    overflow: hidden;
    min-height: 140px;
  }
  .ad-slot .placeholder-label {
    padding: 8px;
    text-align: center;
  }
  .ad-slot-top {
    margin: 16px 28px 0;
  }
  .ad-slot-popular {
    margin: 16px 28px 0;
  }
  .ad-slot-infeed {
    margin: 4px 0;
  }
  .ad-slot-bottom {
    margin: 16px 0 0;
  }
  .link-banner {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    gap: 4px;
    padding: 14px 16px;
    border-radius: 10px;
    background: linear-gradient(135deg, #ff5722, #ff8a00);
    color: #fff;
    text-decoration: none;
    font-size: 13px;
    font-weight: 700;
  }
  .link-banner:hover { opacity: 0.92; }
  .link-banner .link-banner-sub {
    font-size: 10px;
    font-weight: 400;
    opacity: 0.85;
  }

  .passmaster-banner {
    display: flex;
    align-items: center;
    gap: 18px;
    background: #0f2a4a;
    border-radius: 16px;
    padding: 16px 22px;
    text-decoration: none;
  }
  .pm-logo-box {
    flex: 0 0 auto;
    background: #fff;
    border-radius: 12px;
    padding: 8px 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .pm-icon {
    flex: 0 0 auto;
    font-size: 18px;
    background: #0f2a4a;
    color: #fff;
    border-radius: 8px;
    width: 32px;
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .pm-logo-text {
    display: flex;
    flex-direction: column;
    line-height: 1.15;
  }
  .pm-pass {
    font-weight: 900;
    font-size: 17px;
    color: #14304f;
    letter-spacing: 0.5px;
  }
  .pm-master {
    font-weight: 700;
    font-size: 12px;
    color: #2196a8;
    letter-spacing: 0.5px;
  }
  .pm-text {
    flex: 1 1 auto;
    font-weight: 700;
    font-size: 13.5px;
    line-height: 1.5;
    color: #fff;
  }
  .pm-cta {
    flex: 0 0 auto;
    background: #fff;
    color: #14304f;
    font-weight: 700;
    font-size: 13px;
    padding: 10px 18px;
    border-radius: 999px;
    white-space: nowrap;
  }
  .passmaster-banner:hover { opacity: 0.93; }
  @media (max-width: 640px) {
    .passmaster-banner { flex-wrap: wrap; }
    .pm-cta { width: 100%; text-align: center; }
  }

  .card { cursor: pointer; }
  .card:hover { border-color: var(--accent); }

  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.45);
    z-index: 50;
    align-items: flex-start;
    justify-content: center;
    padding: 40px 16px;
    overflow-y: auto;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--card);
    border-radius: 14px;
    max-width: 720px;
    width: 100%;
    padding: 22px 24px 24px;
  }
  .modal-close {
    float: right;
    border: none;
    background: none;
    font-size: 18px;
    color: var(--muted);
    cursor: pointer;
  }
  .modal .modal-desc {
    color: var(--text);
    font-size: 19px;
    font-weight: 800;
    margin-bottom: 14px;
  }
  .modal section {
    margin-top: 18px;
  }
  .modal section h4 {
    margin: 0 0 8px;
    font-size: 13px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.03em;
  }
  .modal select, .modal input[type="text"] {
    width: 100%;
    padding: 9px 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 14px;
    margin-bottom: 10px;
  }
  .detail-block {
    background: #f9fafb;
    border-radius: 8px;
    padding: 10px 14px;
    margin-bottom: 8px;
    font-size: 13px;
    line-height: 1.6;
  }
  .detail-block .infogb {
    font-weight: 600;
    color: var(--accent);
    display: block;
    margin-bottom: 4px;
    font-size: 12px;
  }
  .fee-note {
    font-size: 12px;
    color: var(--muted);
    background: var(--accent-soft);
    padding: 10px 14px;
    border-radius: 8px;
  }
  .fee-note a { color: var(--accent); }
  .popular-info {
    background: linear-gradient(135deg, #fff7ed, #fffbeb);
    border: 1px solid #fde68a;
    border-radius: 10px;
    padding: 14px 16px;
    margin-bottom: 12px;
    font-size: 13px;
    line-height: 1.65;
  }
  .popular-info .popular-title {
    font-weight: 700;
    color: #b45309;
    font-size: 13px;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .popular-info .popular-row { margin-bottom: 6px; }
  .popular-info .popular-row b { color: #92400e; margin-right: 4px; }
  .popular-info .popular-disclaimer {
    margin-top: 8px;
    font-size: 11px;
    color: var(--muted);
  }

  .qual-info-modal .qi-title {
    font-size: 19px;
    font-weight: 800;
    margin: 4px 0 6px;
  }
  .qual-info-modal .qi-badges {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 14px;
  }
  .qi-badge {
    font-size: 12px;
    font-weight: 700;
    padding: 4px 10px;
    border-radius: 999px;
    background: var(--accent-soft);
    color: var(--accent);
  }
  .qi-badge.diff-상 { background: #fee2e2; color: #b91c1c; }
  .qi-badge.diff-중상 { background: #ffedd5; color: #c2410c; }
  .qi-badge.diff-중 { background: #fef3c7; color: #92400e; }
  .qi-badge.diff-하 { background: #dcfce7; color: #15803d; }
  .qi-section {
    margin-bottom: 14px;
  }
  .qi-section h5 {
    font-size: 13px;
    margin: 0 0 6px;
    color: var(--muted);
    font-weight: 700;
  }
  .qi-section p {
    margin: 0;
    font-size: 13.5px;
    line-height: 1.65;
  }
  .qi-cta {
    display: block;
    text-align: center;
    background: var(--accent);
    color: #fff;
    font-weight: 700;
    font-size: 14px;
    padding: 12px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    width: 100%;
    margin-top: 4px;
  }
  .qi-cta:hover { opacity: 0.9; }
  .modal .ad-slot { margin-top: 18px; }
  .qnet-banner {
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    gap: 10px;
    padding: 14px 16px;
    border-radius: 10px;
    background: linear-gradient(135deg, #2563eb, #1d4ed8);
    color: #fff;
    text-decoration: none;
    font-size: 13px;
    font-weight: 600;
  }
  .qnet-banner:hover { opacity: 0.92; }

  .header-actions {
    margin-top: 14px;
    display: flex;
    justify-content: center;
    gap: 8px;
    flex-wrap: wrap;
  }
  .header-btn {
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.4);
    color: #fff;
    font-size: 12px;
    font-weight: 600;
    padding: 7px 14px;
    border-radius: 999px;
    cursor: pointer;
  }
  .header-btn:hover { background: rgba(255,255,255,0.25); }
  .header-btn.on { background: #fff; color: var(--accent); }

  .fav-btn {
    border: none;
    background: none;
    font-size: 20px;
    line-height: 1;
    cursor: pointer;
    color: #d1d5db;
    padding: 2px 4px;
  }
  .fav-btn.active { color: #f59e0b; }
  .card-top-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 8px;
  }

  .popular-section {
    margin: 16px 28px 0;
  }
  .popular-section h2 {
    font-size: 14px;
    margin: 0 0 10px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .popular-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 10px;
  }
  .popular-chip {
    background: #fff7ed;
    border: 1px solid #ffe1b3;
    border-radius: 10px;
    padding: 14px 10px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 700;
    color: var(--text);
    text-align: center;
  }
  .popular-chip:hover { opacity: 0.85; }
  @media (max-width: 640px) {
    .popular-grid { grid-template-columns: repeat(2, 1fr); }
  }

  .fav-section {
    margin: 16px 28px 0;
  }
  .fav-alert {
    background: #fff7ed;
    border: 1px solid #ffe1b3;
    border-radius: 10px;
    padding: 12px 16px;
    font-size: 13px;
    color: #92400e;
  }
  .fav-alert b { color: #b45309; }

  .coupang-search-link {
    display: inline-block;
    margin-top: 10px;
    font-size: 12px;
    color: var(--accent);
    text-decoration: none;
    border: 1px solid var(--accent-soft);
    background: var(--accent-soft);
    padding: 8px 12px;
    border-radius: 8px;
  }
  .coupang-search-link:hover { opacity: 0.85; }
</style>
</head>
<body>

<div class="page">

<header>
  <h1>큐넷 자격증 시험일정 대시보드</h1>
  <p>공공데이터포털 · 한국산업인력공단(Q-Net) Open API 기반</p>
  <div id="meta-banner"></div>
  <div class="header-actions">
    <button class="header-btn" id="notify-btn">🔔 마감 임박 알림 받기</button>
  </div>
</header>

<div id="error-banner"></div>

<div class="ad-slot ad-slot-top" id="ad-slot-top"></div>

<div class="popular-section">
  <h2>⭐ 인기 자격증 TOP 10</h2>
  <div class="popular-grid" id="popular-grid"></div>
</div>

<div class="ad-slot ad-slot-popular" id="ad-slot-popular"></div>

<div class="fav-section" id="fav-section" style="display:none;">
  <div class="fav-alert" id="fav-alert"></div>
</div>

<div class="controls">
  <input type="text" id="search" placeholder="자격구분/설명/종목명 검색 (예: 전기기능사, 정보처리, 기능사...)" />
  <select id="qualgb-filter">
    <option value="">전체 자격구분</option>
  </select>
  <select id="sort-order">
    <option value="upcoming">가까운 접수/시험일 순</option>
    <option value="latest">최근 등록 순</option>
  </select>
  <label class="chip">
    <input type="checkbox" id="only-future" checked />
    15일 이내 일정만 보기
  </label>
  <label class="chip">
    <input type="checkbox" id="only-favorites" />
    ⭐ 즐겨찾기만 보기
  </label>
</div>

<main>
  <div id="search-hint"></div>
  <div class="cards" id="cards"></div>
  <div id="empty">표시할 시험일정이 없어요. 검색어나 필터를 바꿔보세요.</div>
</main>

<footer>
  데이터 출처: <a href="https://www.data.go.kr/data/15074408/openapi.do" target="_blank">한국산업인력공단_국가자격 시험일정 조회 서비스</a>
  · fetch_qnet.py로 최신 데이터를 다시 받아오면 이 페이지도 자동으로 갱신돼요.
  <div class="links">
    <a href="privacy.html">개인정보처리방침</a>
    ·
    <a href="mailto:sanahai71@gmail.com">문의</a>
  </div>
</footer>

</div>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <button class="modal-close" id="modal-close" aria-label="닫기">✕</button>
    <div class="card-top-row">
      <div class="modal-desc" id="modal-desc"></div>
      <button class="fav-btn" id="modal-fav-btn" aria-label="즐겨찾기">☆</button>
    </div>
    <div class="timeline" id="modal-timeline"></div>

    <section>
      <h4>종목 상세정보</h4>
      <div id="modal-jmcd-help" style="font-size:12px;color:var(--muted);margin-bottom:8px;">
        이 회차에는 여러 종목이 함께 시행돼요. 상세정보를 보려면 아래에서 본인이 응시할 종목을 선택하세요.
      </div>
      <input type="text" id="modal-jm-search" placeholder="종목명 검색 (예: 정보처리기사)" list="modal-jm-list" />
      <datalist id="modal-jm-list"></datalist>
      <div id="modal-detail-result"></div>
    </section>

    <section>
      <a class="qnet-banner" href="https://www.q-net.or.kr" target="_blank" rel="noopener">
        <span>큐넷(Q-NET)에서 바로 확인하기</span>
      </a>
    </section>

    <div class="ad-slot" id="ad-slot-modal"></div>
  </div>
</div>

<div class="modal-overlay" id="qual-info-overlay">
  <div class="modal qual-info-modal">
    <button class="modal-close" id="qual-info-close" aria-label="닫기">✕</button>
    <div id="qual-info-body"></div>
  </div>
</div>

<script>
async function loadJSON(path) {
  const res = await fetch(path, { cache: "no-store" });
  if (!res.ok) throw new Error(`${path} 를 불러오지 못했어요 (${res.status})`);
  return res.json();
}

function daysUntil(dateStr) {
  if (!dateStr) return null;
  const today = new Date();
  today.setHours(0,0,0,0);
  const target = new Date(dateStr);
  target.setHours(0,0,0,0);
  return Math.round((target - today) / 86400000);
}

function fmt(dateStr) {
  if (!dateStr) return "-";
  return dateStr;
}

function pickNextEvent(item) {
  const events = [
    { label: "필기 접수 시작", date: item._docRegStart },
    { label: "필기 접수 마감", date: item._docRegEnd },
    { label: "필기 시험일", date: item._docExamStart },
    { label: "필기 합격 발표", date: item._docPass },
    { label: "실기/면접 접수 시작", date: item._pracRegStart },
    { label: "실기/면접 접수 마감", date: item._pracRegEnd },
    { label: "실기/면접 시험일", date: item._pracExamStart },
    { label: "최종 합격 발표", date: item._pracPass },
  ].filter(e => e.date);

  let best = null;
  for (const e of events) {
    const d = daysUntil(e.date);
    if (d === null) continue;
    if (d >= 0 && (best === null || d < best.d)) {
      best = { ...e, d };
    }
  }
  if (best) return best;

  let latestPast = null;
  for (const e of events) {
    const d = daysUntil(e.date);
    if (d === null) continue;
    if (latestPast === null || d > latestPast.d) latestPast = { ...e, d };
  }
  return latestPast;
}

// "15일 이내 일정만 보기"의 기준이 되는 일수. 카드 목록 필터와 박스 안 날짜
// 표시 둘 다 이 값을 같이 써야, "필터는 통과했는데 박스 안에는 15일 넘은
// 날짜가 보이는" 것 같은 불일치가 안 생긴다.
const UPCOMING_RANGE_DAYS = 15;

// 필기 / 실기·면접 을 서로 다른 박스로 나눠서 보여준다.
// 날짜가 하나도 없는 단계는 아예 박스를 만들지 않는다 (예: 필기 없이 실기만 있는 종목).
// 그리고 이미 지난 날짜나 15일보다 먼 날짜는 보여주지 않고,
// 오늘부터 15일 이내에 있는 단계만 파란 박스로 표시한다.
function isRowUpcoming(dateStr) {
  const n = daysUntil(dateStr);
  return n !== null && n >= 0 && n <= UPCOMING_RANGE_DAYS;
}

function renderTimelineBoxes(item) {
  const writtenRows = [
    { label: "접수기간", value: (item._docRegStart || item._docRegEnd) ? `${fmt(item._docRegStart)} ~ ${fmt(item._docRegEnd)}` : null, upcoming: isRowUpcoming(item._docRegEnd) || isRowUpcoming(item._docRegStart) },
    { label: "시험일", value: (item._docExamStart || item._docExamEnd) ? `${fmt(item._docExamStart)} ~ ${fmt(item._docExamEnd)}` : null, upcoming: isRowUpcoming(item._docExamEnd) || isRowUpcoming(item._docExamStart) },
    { label: "합격발표", value: item._docPass ? fmt(item._docPass) : null, upcoming: isRowUpcoming(item._docPass) },
  ].filter(r => r.value && r.upcoming);

  const practicalRows = [
    { label: "접수기간", value: (item._pracRegStart || item._pracRegEnd) ? `${fmt(item._pracRegStart)} ~ ${fmt(item._pracRegEnd)}` : null, upcoming: isRowUpcoming(item._pracRegEnd) || isRowUpcoming(item._pracRegStart) },
    { label: "시험일", value: (item._pracExamStart || item._pracExamEnd) ? `${fmt(item._pracExamStart)} ~ ${fmt(item._pracExamEnd)}` : null, upcoming: isRowUpcoming(item._pracExamEnd) || isRowUpcoming(item._pracExamStart) },
    { label: "최종합격발표", value: item._pracPass ? fmt(item._pracPass) : null, upcoming: isRowUpcoming(item._pracPass) },
  ].filter(r => r.value && r.upcoming);

  const boxHtml = (title, rows) => `
    <div class="phase-box phase-upcoming">
      <div class="phase-title">${title}</div>
      ${rows.map(r => `<div class="phase-row"><span class="phase-label">${r.label}</span><span class="phase-value">${r.value}</span></div>`).join("")}
    </div>
  `;

  // writtenRows/practicalRows는 위에서 이미 "15일 이내에 있는 날짜"만 남긴 것이라
  // 배열에 뭐라도 남아있으면 그 단계를 보여주면 된다.
  let html = "";
  if (writtenRows.length > 0) html += boxHtml("필기시험", writtenRows);
  if (practicalRows.length > 0) html += boxHtml("실기/면접시험", practicalRows);
  if (!html) html = `<div class="phase-box phase-empty">15일 이내 진행되는 일정이 없어요</div>`;

  return `<div class="phase-boxes">${html}</div>`;
}

// 표시되는 일정이 너무 많다는 피드백이 있어서, "15일 이내 일정만 보기"를 켜면
// 오늘부터 15일 이내에 뭔가(접수/시험/발표) 일어나는 항목만 남긴다.
function hasUpcomingWithinDays(item, days) {
  const dates = [item._docRegStart, item._docRegEnd, item._docExamStart, item._docExamEnd,
                 item._docPass, item._pracRegStart, item._pracRegEnd, item._pracExamStart,
                 item._pracExamEnd, item._pracPass];
  return dates.some(d => {
    const n = daysUntil(d);
    return n !== null && n >= 0 && n <= days;
  });
}

// 같은 회차(자격구분+연도+회차)가 데이터에 두 번 이상 들어있는 경우가 있어서,
// 화면에 보여주기 직전에 중복을 제거한다.
function dedupeSchedules(list) {
  const seen = new Set();
  const result = [];
  for (const item of list) {
    const key = `${item.qualgbCd}::${item.implYy}::${item.implSeq}`;
    if (seen.has(key)) continue;
    seen.add(key);
    result.push(item);
  }
  return result;
}

let SCHEDULES = [];
let QUALGB_SET = new Set();
let QUALIFICATIONS = [];
let QUAL_DETAILS = {};

// ---- 즐겨찾기 (브라우저 localStorage에 저장, 로그인/서버 없이 동작) ----
function scheduleKey(item) {
  return `${item.qualgbCd}::${item.implYy}::${item.implSeq}`;
}
function loadFavorites() {
  try {
    return new Set(JSON.parse(localStorage.getItem("qnet_favorites") || "[]"));
  } catch (e) {
    return new Set();
  }
}
function saveFavorites() {
  localStorage.setItem("qnet_favorites", JSON.stringify([...FAVORITES]));
}
let FAVORITES = loadFavorites();
function isFavorite(item) {
  return FAVORITES.has(scheduleKey(item));
}
function toggleFavorite(item) {
  const key = scheduleKey(item);
  if (FAVORITES.has(key)) FAVORITES.delete(key);
  else FAVORITES.add(key);
  saveFavorites();
}

function getMatchingSeries(q) {
  if (!q) return [];
  const seen = new Set();
  const result = [];
  for (const item of QUALIFICATIONS) {
    const name = (item.jmfldnm || "").toLowerCase();
    if (name.includes(q)) {
      const key = `${item.qualgbcd}::${item.seriesnm}`;
      if (!seen.has(key)) {
        seen.add(key);
        result.push({ qualgbcd: item.qualgbcd, seriesnm: item.seriesnm, jmfldnm: item.jmfldnm });
      }
    }
  }
  return result;
}

// 이 회차(item)에 실제로 관련된 종목만 골라낸다.
// description에 종목의 계열명(seriesnm)이 포함돼 있는 것만 선택하고,
// 혹시 그 방식으로 하나도 못 찾으면(설명 형식이 다른 예외 케이스) 자격구분 전체로 되돌아간다.
function getRelevantQualifications(item) {
  const byGb = QUALIFICATIONS.filter(q => (q.qualgbcd || q.qualgbCd) === item.qualgbCd);
  const desc = item.description || "";
  const bySeries = byGb.filter(q => {
    const series = q.seriesnm || q.seriesNm || "";
    return series && desc.includes(series);
  });
  return bySeries.length > 0 ? bySeries : byGb;
}

// 큐넷 API가 contents 앞에 "BODY {...} P {...} LI {...}" 같은 워드프로세서 CSS
// 스타일 정의를 그대로 붙여서 주는 경우가 있어서, 그 부분만 잘라내고
// 실제 텍스트만 남긴다. (HTML 태그는 안 들어있고 순수 텍스트라 태그 제거는 불필요)
function cleanQnetText(text) {
  if (!text) return "";
  const cleaned = text
    .replace(/^(?:\s*[A-Za-z][A-Za-z0-9_-]*\s*\{[^}]*\}\s*)+/, "")
    .trim();
  return cleaned.replace(/\n/g, "<br>");
}

// jmfldnm(예: "전기기능사(전기)")에 괄호나 공백이 붙어 있어도 매칭되도록,
// QUAL_CONTENT 키가 부분 문자열로 포함되는지로 찾는다.
function findPopularContent(jmfldnm) {
  if (!jmfldnm) return null;
  const name = jmfldnm.trim();
  if (QUAL_CONTENT[name]) return QUAL_CONTENT[name];
  const key = Object.keys(QUAL_CONTENT).find(k => name.includes(k) || k.includes(name));
  return key ? QUAL_CONTENT[key] : null;
}

function renderPopularInfo(jmfldnm) {
  const info = findPopularContent(jmfldnm);
  if (!info) return "";
  return `
    <div class="popular-info">

      <div class="popular-row"><b>개요</b>${info.overview}</div>

    const coupangUrl = `https://www.coupang.com/np/search?component=&q=${encodeURIComponent(jmfldnm + " 수험서")}`;
    const coupangLink = jmfldnm
      ? `<a class="coupang-search-link" href="${coupangUrl}" target="_blank" rel="noopener">🛒 "${jmfldnm}" 수험서 쿠팡에서 찾아보기</a>`

    const detail = QUAL_DETAILS[match.jmcd];

    }
    // 응시자격(누가 볼 수 있는지) / 시험과목 및 배점(뭘 시험보는지) / 취득방법(어떻게 따는지)
    // 순서로 보여준다. 출제경향·출제기준은 대부분 실질적인 내용 없이 "자료실 참고" 안내뿐이라 뺐다.
    const byGb = new Map(detail.info.map(i => [i.infogb, i]));
    const blocks = DETAIL_INFOGB_ORDER
      .filter(gb => byGb.has(gb))
      .map(gb => ({ infogb: gb, contents: byGb.get(gb).contents }));

    if (blocks.length === 0) {
      resultEl.innerHTML = popularHtml + `<div class="fee-note">이 종목은 상세정보가 큐넷에 등록돼 있지 않아요.</div>${coupangLink}`;

  searchInput.oninput = () => showDetailFor(searchInput.value);

  // 검색어(예: "전기기능사")로 들어왔다면, 관련 종목 중 그 검색어와 가장 잘 맞는 종목을
  // 자동으로 선택해서 바로 상세정보를 보여준다. 그러면 사용자가 매번 리스트에서
  // 다시 찾아야 하는 번거로움이 없어진다.
  let preselected = "";
  if (searchQuery) {

    if (preMatch) preselected = preMatch.jmfldnm;
  }
  searchInput.value = preselected;
  if (preselected) {
    showDetailFor(preselected);
  } else {

  }

  document.getElementById("modal-overlay").classList.add("open");
}

// 쿠팡파트너스 위젯 스크립트는 내부적으로 document.write()를 쓰는 것으로 보이는데,
// 페이지가 이미 다 로드된 뒤(예: 카드 목록을 나중에 JS로 그릴 때) document.write()를
// 부르면 브라우저가 그걸 막아버려서 광고 자리가 빈 채로 남는다(실제로 이 문제가 있었음).
// 그래서 별도의 빈 iframe을 하나 만들고, 그 iframe 문서 안에서만 document.write로
// 스크립트를 실행하게 하면 안전하게 광고가 뜬다.
//
// 또한 원래 스니펫은 width/height가 680/140으로 고정돼 있어서, 모바일 화면처럼
// 680px보다 좁은 화면에서는 광고가 화면 밖으로 삐져나가 좌우 스크롤이 생겼다.
// 그래서 실제 컨테이너 너비에 맞춰 width/height를 매번 다시 계산해서 넣어준다.
function loadCoupangAd(container) {
  if (!container) return;
  const maxW = 680;
  // 피드 중간 광고는 아직 화면에 붙기 전(appendChild 되기 전)에 이 함수가 불릴 수 있어서
  // container.clientWidth가 0이고 container.parentElement도 null일 수 있다.
  // parentElement를 곧바로 참조하면 null.clientWidth를 읽으려다 에러가 나므로
  // 안전하게 하나씩 순서대로 확인한다.
  let available = container.clientWidth;
  if (!available && container.parentElement) available = container.parentElement.clientWidth;
  if (!available) available = window.innerWidth;
  const width = Math.max(300, Math.min(maxW, Math.floor(available)));
  const height = Math.round(width * (140 / 680));

  const iframe = document.createElement("iframe");
  iframe.style.width = "100%";
  iframe.style.maxWidth = width + "px";
  iframe.style.height = height + "px";
  iframe.style.border = "none";
  iframe.style.display = "block";
  iframe.scrolling = "no";
  container.appendChild(iframe);

  const doc = iframe.contentWindow.document;
  doc.open();
  doc.write(`
    <!DOCTYPE html><html><head><meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"></head>
    <body style="margin:0;padding:0;overflow:hidden;">
      <script src="https://ads-partners.coupang.com/g.js"><\/script>
      <script>
        new PartnersCoupang.G({"id":1009073,"trackingCode":"AF5788516","subId":null,"template":"carousel","width":"${width}","height":"${height}"});
      <\/script>
    </body></html>
  `);
  doc.close();
}

function renderFavAlert() {
  const sectionEl = document.getElementById("fav-section");
  const alertEl = document.getElementById("fav-alert");
  const favItems = SCHEDULES.filter(isFavorite);

  if (favItems.length === 0) {
    sectionEl.style.display = "none";
    return;
  }

  const soon = favItems
    .map(item => ({ item, next: pickNextEvent(item) }))
    .filter(x => x.next && x.next.d >= 0 && x.next.d <= UPCOMING_RANGE_DAYS)
    .sort((a, b) => a.next.d - b.next.d);

  sectionEl.style.display = "block";
  if (soon.length === 0) {
    alertEl.innerHTML = `⭐ 즐겨찾기한 일정 ${favItems.length}건 중 15일 이내 다가오는 일정은 없어요.`;
    return;
  }
  alertEl.innerHTML = `⭐ 즐겨찾기한 일정 중 <b>${soon.length}건</b>이 15일 이내예요: ` +
    soon.map(x => `<b>${x.item.description}</b>(${x.next.label} D-${x.next.d})`).join(", ");
}

// 즐겨찾기한 일정의 마감이 가까워지면 브라우저 알림을 띄운다.
// 주의: 이건 사이트를 실제로 열었을 때만 동작하는 "방문 시 알림"이고,
// 앱을 꺼둔 상태에서도 오는 진짜 푸시 알림은 별도 서버(푸시 서비스)가 있어야 해서
// 이 정적 사이트 구조로는 지원이 안 된다. 그 점은 사용자에게 안내가 필요하다.
function checkFavoriteReminders() {
  if (!("Notification" in window) || Notification.permission !== "granted") return;
  const notifiedKey = "qnet_notified_" + new Date().toISOString().slice(0, 10); // 날짜별로 하루 한 번만
  let notifiedToday;
  try { notifiedToday = new Set(JSON.parse(localStorage.getItem(notifiedKey) || "[]")); }
  catch (e) { notifiedToday = new Set(); }

  const favItems = SCHEDULES.filter(isFavorite);
  for (const item of favItems) {
    const next = pickNextEvent(item);
    if (!next || next.d < 0 || next.d > 3) continue;
    const key = scheduleKey(item) + "::" + next.label;
    if (notifiedToday.has(key)) continue;
    new Notification("자격증 시험일정 알림", {
      body: `${item.description} - ${next.label}까지 ${next.d === 0 ? "오늘" : `D-${next.d}`}`,
    });
    notifiedToday.add(key);
  }
  localStorage.setItem(notifiedKey, JSON.stringify([...notifiedToday]));
}

function render() {
  const q = document.getElementById("search").value.trim().toLowerCase();
  const qualgb = document.getElementById("qualgb-filter").value;
  const onlyFuture = document.getElementById("only-future").checked;
  const onlyFavorites = document.getElementById("only-favorites").checked;
  const sortOrder = document.getElementById("sort-order").value;

  const matchingSeries = getMatchingSeries(q);

  let filtered = SCHEDULES.filter(item => {
    if (qualgb && item.qualgbCd !== qualgb) return false;
    if (onlyFavorites && !isFavorite(item)) return false;
    if (onlyFuture && !hasUpcomingWithinDays(item, UPCOMING_RANGE_DAYS)) return false;
    if (q) {
      const hay = `${item.qualgbNmKo || ""} ${item.description || ""} ${item.implYy || ""} ${item.implSeq || ""}`.toLowerCase();
      const direct = hay.includes(q);
      const viaSeries = matchingSeries.some(s =>
        s.qualgbcd === item.qualgbCd && item.description && item.description.includes(s.seriesnm)
      );
      if (!direct && !viaSeries) return false;
    }
    return true;
  });

  const withNext = filtered.map(item => ({ item, next: pickNextEvent(item) }));

  if (sortOrder === "upcoming") {
    withNext.sort((a, b) => {
      const da = a.next ? a.next.d : Infinity;
      const db = b.next ? b.next.d : Infinity;
      return da - db;
    });
  } else {
    withNext.sort((a, b) => {
      return (b.item.implYy + b.item.implSeq).localeCompare(a.item.implYy + a.item.implSeq);
    });
  }

  const cardsEl = document.getElementById("cards");
  const emptyEl = document.getElementById("empty");
  const hintEl = document.getElementById("search-hint");
  cardsEl.innerHTML = "";

  if (withNext.length === 0) {
    emptyEl.style.display = "block";
  } else {
    emptyEl.style.display = "none";
  }

  const directHit = q && SCHEDULES.some(item => {
    const hay = `${item.qualgbNmKo || ""} ${item.description || ""}`.toLowerCase();
    return hay.includes(q);
  });
  if (q && matchingSeries.length > 0 && !directHit) {
    const names = [...new Set(matchingSeries.map(s => s.seriesnm))].join(", ");
    hintEl.style.display = "block";
    hintEl.textContent = `"${q}"의 개별 시행일정은 따로 없고, 같은 계열(${names})의 공통 시험일정으로 안내돼요. 큐넷이 종목별이 아닌 계열 단위로 일정을 제공하기 때문이에요.`;
  } else {
    hintEl.style.display = "none";
  }

  // 전체 페이지 기준 배너는 순서대로 총 5개:
  // ①상단(링크 배너) ②인기 자격증 아래 ③④일정 목록 중간(고정 위치 2곳) ⑤맨 마지막 일정 다음(하단).
  // ③④는 목록이 짧으면 자연스럽게 생략된다.
  const AD_POSITIONS = [5, 15];
  let cardIndex = 0;

  for (const { item, next } of withNext) {
    if (AD_POSITIONS.includes(cardIndex)) {
      const adEl = makeInFeedAd();
      cardsEl.appendChild(adEl);
      // DOM에 실제로 붙은 뒤에 불러야 컨테이너 너비를 정확히 잴 수 있다.
      loadCoupangAd(adEl);
    }
    cardIndex++;

    const card = document.createElement("div");
    card.className = "card";

    let ddayHtml = `<div class="dday"><div class="num">-</div><div class="sub">일정 없음</div></div>`;
    if (next) {
      let cls = "ok";
      if (next.d < 0) cls = "past";
      else if (next.d <= 7) cls = "soon";
      const label = next.d < 0 ? `${Math.abs(next.d)}일 지남` : (next.d === 0 ? "D-DAY" : `D-${next.d}`);
      ddayHtml = `<div class="dday ${cls}"><div class="num">${label}</div><div class="sub">${next.label}<br>${fmt(next.date)}</div></div>`;
    }

    card.innerHTML = `
      <div>
        <div class="card-top-row">
          <div class="desc">${item.description || ""}</div>
          <button class="fav-btn ${isFavorite(item) ? "active" : ""}" aria-label="즐겨찾기">${isFavorite(item) ? "★" : "☆"}</button>
        </div>
        ${renderTimelineBoxes(item)}
      </div>
      ${ddayHtml}
    `;
    const favBtn = card.querySelector(".fav-btn");
    favBtn.addEventListener("click", (e) => {
      e.stopPropagation();
      toggleFavorite(item);
      favBtn.classList.toggle("active");
      favBtn.textContent = favBtn.classList.contains("active") ? "★" : "☆";
      renderFavAlert();
    });
    card.addEventListener("click", () => openModal(item, q));
    cardsEl.appendChild(card);
  }

  // 배너 ⑤: 페이지 맨 하단, 마지막 일정 카드 바로 다음.
  if (withNext.length > 0) {
    const bottomAd = document.createElement("div");
    bottomAd.className = "ad-slot ad-slot-bottom";
    cardsEl.appendChild(bottomAd);
    loadCoupangAd(bottomAd);
  }
}

async function init() {
  const errorEl = document.getElementById("error-banner");
  try {
    const [schedules, meta, qualifications, qualDetails] = await Promise.all([
      loadJSON("data/schedules.json"),
      loadJSON("data/meta.json").catch(() => null),
      loadJSON("data/qualifications.json").catch(() => []),
      loadJSON("data/qual_details.json").catch(() => ({})),
    ]);
    SCHEDULES = dedupeSchedules(schedules);
    QUALIFICATIONS = qualifications;
    QUAL_DETAILS = qualDetails;

    document.getElementById("modal-close").addEventListener("click", closeModal);
    document.getElementById("modal-overlay").addEventListener("click", (e) => {
      if (e.target.id === "modal-overlay") closeModal();
    });
    document.getElementById("qual-info-close").addEventListener("click", closeQualInfoModal);
    document.getElementById("qual-info-overlay").addEventListener("click", (e) => {
      if (e.target.id === "qual-info-overlay") closeQualInfoModal();
    });

    if (meta) {
      document.getElementById("meta-banner").textContent =
        `마지막 수집: ${new Date(meta.generated_at).toLocaleString("ko-KR")} · ${meta.years.join(", ")}년 · 자격구분 ${meta.qualgb.join(", ")}`;
    }

    const qualgbSelect = document.getElementById("qualgb-filter");
    const seen = new Map();
    for (const s of SCHEDULES) {
      if (s.qualgbCd) seen.set(s.qualgbCd, s.qualgbNmKo || s.qualgbNm || s.qualgbCd);
    }
    for (const [code, name] of seen) {
      const opt = document.createElement("option");
      opt.value = code;
      opt.textContent = name;
      qualgbSelect.appendChild(opt);
    }

    document.getElementById("search").addEventListener("input", render);
    document.getElementById("qualgb-filter").addEventListener("change", render);
    document.getElementById("sort-order").addEventListener("change", render);
    document.getElementById("only-future").addEventListener("change", render);
    document.getElementById("only-favorites").addEventListener("change", render);

    render();
    renderPopularGrid();
    renderFavAlert();
    checkFavoriteReminders();
  } catch (e) {
    errorEl.style.display = "block";
    errorEl.innerHTML = `
      데이터를 불러오지 못했어요: ${e.message}<br>
      먼저 <code>fetch_qnet.py</code>를 실행해서 <code>data/schedules.json</code>을 만들어야 하고,
      이 페이지는 <code>python -m http.server</code>로 로컬 서버를 띄운 뒤 열어야 정상 작동해요.
    `;
  }
}

init();

renderPassMasterBanner(document.getElementById("ad-slot-top"));
loadCoupangAd(document.getElementById("ad-slot-popular"));
loadCoupangAd(document.getElementById("ad-slot-modal"));

// 알림 버튼: 브라우저 알림 권한을 요청한다. 참고로 이건 "이 사이트를 열어뒀을 때"만
// 동작하는 방식이고(방문 시 즐겨찾기 마감 체크), 앱을 완전히 꺼둬도 오는 진짜
// 푸시 알림은 서버 인프라가 필요해서 정적 사이트로는 지원하지 않는다.
function updateNotifyBtn() {
  const btn = document.getElementById("notify-btn");
  if (!("Notification" in window)) {
    btn.textContent = "🔔 이 브라우저는 알림 미지원";
    btn.disabled = true;
    return;
  }
  if (Notification.permission === "granted") {
    btn.textContent = "🔔 알림 켜짐 (즐겨찾기 마감 임박 시)";
    btn.classList.add("on");
  } else {
    btn.textContent = "🔔 마감 임박 알림 받기";
    btn.classList.remove("on");
  }
}
document.getElementById("notify-btn").addEventListener("click", async () => {
  if (!("Notification" in window)) return;
  if (Notification.permission === "granted") {
    alert("이미 알림이 켜져 있어요. ⭐ 즐겨찾기에 추가한 자격증의 접수/시험이 3일 이내로 다가오면, 이 사이트를 열 때 알려드려요.");
    return;
  }
  const perm = await Notification.requestPermission();
  updateNotifyBtn();
  if (perm === "granted") {
    checkFavoriteReminders();
  }
});
updateNotifyBtn();

if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("service-worker.js").catch(() => {});
}
</script>
