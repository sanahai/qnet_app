<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>큐넷 자격증 시험일정</title>
<link rel="manifest" href="manifest.json" />
<link rel="icon" href="icons/icon-192.png" />
<link rel="apple-touch-icon" href="icons/icon-180.png" />
<meta name="theme-color" content="#2563eb" />

<style>
  :root {
    --bg: #f6f7f9;
    --card: #ffffff;
    --border: #e3e6ea;
    --text: #1f2430;
    --muted: #6b7280;
    --accent: #2563eb;
    --accent-soft: #eaf1ff;
    --danger: #dc2626;
    --danger-soft: #fdeaea;
    --ok: #16a34a;
    --ok-soft: #e9f9ee;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Malgun Gothic", sans-serif;
    background: var(--bg);
    color: var(--text);
  }
  .page {
    max-width: 880px;
    margin: 0 auto;
    background: var(--card);
    min-height: 100vh;
    box-shadow: 0 0 0 1px var(--border);
  }
  header {
    padding: 32px 24px 26px;
    background: linear-gradient(135deg, #2563eb, #1d4ed8);
    text-align: center;
  }
  header h1 {
    margin: 0 0 6px;
    font-size: 22px;
    color: #fff;
    font-weight: 800;
  }
  header p {
    margin: 0;
    color: rgba(255,255,255,0.85);
    font-size: 13px;
  }
  #meta-banner {
    margin-top: 10px;
    font-size: 12px;
    color: rgba(255,255,255,0.75);
  }
  #error-banner {
    display: none;
    margin: 16px 28px 0;
    padding: 12px 16px;
    background: var(--danger-soft);
    color: var(--danger);
    border-radius: 8px;
    font-size: 13px;
    line-height: 1.6;
  }
  .controls {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    padding: 16px 28px;
    background: var(--card);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 5;
  }
  .controls input[type="text"] {
    flex: 1;
    min-width: 200px;
    padding: 9px 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 14px;
  }
  .controls select {
    padding: 9px 10px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 14px;
    background: white;
  }
  .controls label.chip {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 13px;
    color: var(--muted);
    cursor: pointer;
  }
  main {
    padding: 20px 28px 60px;
  }
  #search-hint {
    display: none;
    margin: -8px 0 16px;
    padding: 10px 14px;
    background: var(--accent-soft);
    color: var(--accent);
    border-radius: 8px;
    font-size: 12px;
    line-height: 1.6;
  }
  #stats {
    display: flex;
    gap: 12px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  .stat-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 18px;
    font-size: 13px;
    color: var(--muted);
  }
  .stat-card b {
    display: block;
    font-size: 20px;
    color: var(--text);
    margin-top: 2px;
  }
  .cards {
    display: grid;
    gap: 12px;
  }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 18px;
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 10px;
    align-items: start;
  }
  .card .title-row {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }
  .badge {
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 999px;
    background: var(--accent-soft);
    color: var(--accent);
    font-weight: 600;
    white-space: nowrap;
  }
  .card h3 {
    margin: 0;
    font-size: 15px;
  }
  .card .desc {
    color: var(--text);
    font-size: 16px;
    font-weight: 700;
    margin-top: 2px;
  }
  .timeline {
    margin-top: 10px;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    font-size: 12px;
  }
  .tl-item {
    padding: 6px 10px;
    border-radius: 8px;
    background: #f3f4f6;
    color: var(--text);
  }
  .tl-item .lbl {
    color: var(--muted);
    margin-right: 4px;
  }
  .phase-boxes {
    margin-top: 10px;
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 12px;
  }
  .phase-box {
    flex: 1 1 220px;
    min-width: 220px;
    max-width: 300px;
    border-radius: 10px;
    padding: 12px 16px;
    font-size: 12px;
    border: 1px solid transparent;
  }
  .phase-box.phase-empty {
    background: #f3f4f6;
    color: var(--muted);
    flex: none;
  }
  /* 지난 일정(더 이상 다가오는 날짜가 없는 단계)은 무채색으로,
     아직 시작 전/진행중인(다가오는 날짜가 있는) 단계는 파란 박스로 강조한다. */
  .phase-upcoming {
    background: var(--accent-soft);
    border-color: #cfe0ff;
  }
  .phase-past {
    background: #f3f4f6;
    border-color: var(--border);
  }
  .phase-title {
    font-weight: 700;
    margin-bottom: 8px;
    font-size: 14px;
  }
  .phase-upcoming .phase-title { color: var(--accent); }
  .phase-past .phase-title { color: var(--muted); }
  .phase-row {
    display: flex;
    justify-content: space-between;
    gap: 10px;
    padding: 3px 0;
    white-space: nowrap;
  }
  .phase-row .phase-label {
    color: var(--muted);
    white-space: nowrap;
  }
  .phase-row .phase-value {
    font-weight: 600;
    text-align: right;
    white-space: nowrap;
  }
  .dday {
    text-align: right;
    white-space: nowrap;
  }
  .dday .num {
    font-size: 22px;
    font-weight: 700;
  }
  .dday .sub {
    font-size: 11px;
    color: var(--muted);
  }
  .dday.soon .num { color: var(--danger); }
  .dday.ok .num { color: var(--ok); }
  .dday.past .num { color: var(--muted); }
  #empty {
    text-align: center;
    color: var(--muted);
    padding: 60px 0;
    display: none;
  }
  footer {
    text-align: center;
    color: var(--muted);
    font-size: 12px;
    padding: 20px;
  }
  footer a { color: var(--accent); }
  footer .links { margin-top: 6px; }
  footer .links a { margin: 0 6px; }

  .ad-slot {
    background: var(--card);
    border: 1px dashed var(--border);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--muted);
    font-size: 12px;
    overflow: hidden;
    min-height: 140px;
  }
  .ad-slot .placeholder-label {
    padding: 8px;
    text-align: center;
  }
  .ad-slot-top {
    margin: 16px 28px 0;
  }
  .ad-slot-infeed {
    margin: 4px 0;
  }

  .card { cursor: pointer; }
  .card:hover { border-color: var(--accent); }

  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.45);
    z-index: 50;
    align-items: flex-start;
    justify-content: center;
    padding: 40px 16px;
    overflow-y: auto;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--card);
    border-radius: 14px;
    max-width: 720px;
    width: 100%;
    padding: 22px 24px 24px;
  }
  .modal-close {
    float: right;
    border: none;
    background: none;
    font-size: 18px;
    color: var(--muted);
    cursor: pointer;
  }
  .modal .modal-desc {
    color: var(--text);
    font-size: 19px;
    font-weight: 800;
    margin-bottom: 14px;
  }
  .modal section {
    margin-top: 18px;
  }
  .modal section h4 {
    margin: 0 0 8px;
    font-size: 13px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.03em;
  }
  .modal select, .modal input[type="text"] {
    width: 100%;
    padding: 9px 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 14px;
    margin-bottom: 10px;
  }
  .detail-block {
    background: #f9fafb;
    border-radius: 8px;
    padding: 10px 14px;
    margin-bottom: 8px;
    font-size: 13px;
    line-height: 1.6;
  }
  .detail-block .infogb {
    font-weight: 600;
    color: var(--accent);
    display: block;
    margin-bottom: 4px;
    font-size: 12px;
  }
  .fee-note {
    font-size: 12px;
    color: var(--muted);
    background: var(--accent-soft);
    padding: 10px 14px;
    border-radius: 8px;
  }
  .fee-note a { color: var(--accent); }
  .modal .ad-slot { margin-top: 18px; }
  .qnet-banner {
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    gap: 10px;
    padding: 14px 16px;
    border-radius: 10px;
    background: linear-gradient(135deg, #2563eb, #1d4ed8);
    color: #fff;
    text-decoration: none;
    font-size: 13px;
    font-weight: 600;
  }
  .qnet-banner:hover { opacity: 0.92; }
</style>

<script>
async function loadJSON(path) {
  const res = await fetch(path, { cache: "no-store" });
  if (!res.ok) throw new Error(`${path} 를 불러오지 못했어요 (${res.status})`);
  return res.json();
}

function daysUntil(dateStr) {
  if (!dateStr) return null;
  const today = new Date();
  today.setHours(0,0,0,0);
  const target = new Date(dateStr);
  target.setHours(0,0,0,0);
  return Math.round((target - today) / 86400000);
}

function fmt(dateStr) {
  if (!dateStr) return "-";
  return dateStr;
}

function pickNextEvent(item) {
  const events = [
    { label: "필기 접수 시작", date: item._docRegStart },
    { label: "필기 접수 마감", date: item._docRegEnd },
    { label: "필기 시험일", date: item._docExamStart },
    { label: "필기 합격 발표", date: item._docPass },
    { label: "실기/면접 접수 시작", date: item._pracRegStart },
    { label: "실기/면접 접수 마감", date: item._pracRegEnd },
    { label: "실기/면접 시험일", date: item._pracExamStart },
    { label: "최종 합격 발표", date: item._pracPass },
  ].filter(e => e.date);

  let best = null;
  for (const e of events) {
    const d = daysUntil(e.date);
    if (d === null) continue;
    if (d >= 0 && (best === null || d < best.d)) {
      best = { ...e, d };
    }
  }
  if (best) return best;

  let latestPast = null;
  for (const e of events) {
    const d = daysUntil(e.date);
    if (d === null) continue;
    if (latestPast === null || d > latestPast.d) latestPast = { ...e, d };
  }
  return latestPast;
}

// 필기 / 실기·면접 을 서로 다른 박스로 나눠서 보여준다.
// 날짜가 하나도 없는 단계는 아예 박스를 만들지 않는다 (예: 필기 없이 실기만 있는 종목).
// 그리고 이미 다 지나간 단계(다가오는 날짜가 하나도 없는 단계)도 아예 보여주지 않고,
// 아직 진행 중이거나 앞으로 있을 단계만 파란 박스로 표시한다.
function isRowUpcoming(dateStr) {
  const n = daysUntil(dateStr);
  return n !== null && n >= 0;
}

function renderTimelineBoxes(item) {
  const writtenRows = [
    { label: "접수기간", value: (item._docRegStart || item._docRegEnd) ? `${fmt(item._docRegStart)} ~ ${fmt(item._docRegEnd)}` : null, upcoming: isRowUpcoming(item._docRegEnd) || isRowUpcoming(item._docRegStart) },
    { label: "시험일", value: (item._docExamStart || item._docExamEnd) ? `${fmt(item._docExamStart)} ~ ${fmt(item._docExamEnd)}` : null, upcoming: isRowUpcoming(item._docExamEnd) || isRowUpcoming(item._docExamStart) },
    { label: "합격발표", value: item._docPass ? fmt(item._docPass) : null, upcoming: isRowUpcoming(item._docPass) },
  ].filter(r => r.value);

  const practicalRows = [
    { label: "접수기간", value: (item._pracRegStart || item._pracRegEnd) ? `${fmt(item._pracRegStart)} ~ ${fmt(item._pracRegEnd)}` : null, upcoming: isRowUpcoming(item._pracRegEnd) || isRowUpcoming(item._pracRegStart) },
    { label: "시험일", value: (item._pracExamStart || item._pracExamEnd) ? `${fmt(item._pracExamStart)} ~ ${fmt(item._pracExamEnd)}` : null, upcoming: isRowUpcoming(item._pracExamEnd) || isRowUpcoming(item._pracExamStart) },
    { label: "최종합격발표", value: item._pracPass ? fmt(item._pracPass) : null, upcoming: isRowUpcoming(item._pracPass) },
  ].filter(r => r.value);

  const boxHtml = (title, rows) => `
    <div class="phase-box phase-upcoming">
      <div class="phase-title">${title}</div>
      ${rows.map(r => `<div class="phase-row"><span class="phase-label">${r.label}</span><span class="phase-value">${r.value}</span></div>`).join("")}
    </div>
  `;

  // 단계 전체가 이미 다 지나갔으면(모든 날짜가 과거면) 그 박스는 아예 표시하지 않는다.
  const writtenUpcoming = writtenRows.some(r => r.upcoming);
  const practicalUpcoming = practicalRows.some(r => r.upcoming);

  let html = "";
  if (writtenRows.length > 0 && writtenUpcoming) html += boxHtml("필기시험", writtenRows);
  if (practicalRows.length > 0 && practicalUpcoming) html += boxHtml("실기/면접시험", practicalRows);
  if (!html) html = `<div class="phase-box phase-empty">진행 중인 일정이 없어요 (모든 단계 종료)</div>`;

  return `<div class="phase-boxes">${html}</div>`;
}

// 표시되는 일정이 너무 많다는 피드백이 있어서, "15일 이내 일정만 보기"를 켜면
// 오늘부터 15일 이내에 뭔가(접수/시험/발표) 일어나는 항목만 남긴다.
function hasUpcomingWithinDays(item, days) {
  const dates = [item._docRegStart, item._docRegEnd, item._docExamStart, item._docExamEnd,
                 item._docPass, item._pracRegStart, item._pracRegEnd, item._pracExamStart,
                 item._pracExamEnd, item._pracPass];
  return dates.some(d => {
    const n = daysUntil(d);
    return n !== null && n >= 0 && n <= days;
  });
}

let SCHEDULES = [];
let QUALGB_SET = new Set();
let QUALIFICATIONS = [];
let QUAL_DETAILS = {};

function getMatchingSeries(q) {
  if (!q) return [];
  const seen = new Set();
  const result = [];
  for (const item of QUALIFICATIONS) {
    const name = (item.jmfldnm || "").toLowerCase();
    if (name.includes(q)) {
      const key = `${item.qualgbcd}::${item.seriesnm}`;
      if (!seen.has(key)) {
        seen.add(key);
        result.push({ qualgbcd: item.qualgbcd, seriesnm: item.seriesnm, jmfldnm: item.jmfldnm });
      }
    }
  }
  return result;
}

// 이 회차(item)에 실제로 관련된 종목만 골라낸다.
// description에 종목의 계열명(seriesnm)이 포함돼 있는 것만 선택하고,
// 혹시 그 방식으로 하나도 못 찾으면(설명 형식이 다른 예외 케이스) 자격구분 전체로 되돌아간다.
function getRelevantQualifications(item) {
  const byGb = QUALIFICATIONS.filter(q => (q.qualgbcd || q.qualgbCd) === item.qualgbCd);
  const desc = item.description || "";
  const bySeries = byGb.filter(q => {
    const series = q.seriesnm || q.seriesNm || "";
    return series && desc.includes(series);
  });
  return bySeries.length > 0 ? bySeries : byGb;
}

// 큐넷 API가 contents 앞에 "BODY {...} P {...} LI {...}" 같은 워드프로세서 CSS
// 스타일 정의를 그대로 붙여서 주는 경우가 있어서, 그 부분만 잘라내고
// 실제 텍스트만 남긴다. (HTML 태그는 안 들어있고 순수 텍스트라 태그 제거는 불필요)
function cleanQnetText(text) {
  if (!text) return "";
  const cleaned = text
    .replace(/^(?:\s*[A-Za-z][A-Za-z0-9_-]*\s*\{[^}]*\}\s*)+/, "")
    .trim();
  return cleaned.replace(/\n/g, "<br>");
}

function openModal(item, searchQuery) {
  document.getElementById("modal-desc").textContent = item.description || "";

  const tl = document.getElementById("modal-timeline");
  tl.innerHTML = renderTimelineBoxes(item);

  const relevant = getRelevantQualifications(item);
  const listEl = document.getElementById("modal-jm-list");
  listEl.innerHTML = relevant.map(q => `<option value="${q.jmfldnm}">`).join("");

  const helpEl = document.getElementById("modal-jmcd-help");
  helpEl.textContent = `이 회차와 관련된 종목 ${relevant.length}개 중에서 본인이 응시할 종목을 선택하면, 정확한 시험과목을 볼 수 있어요.`;

  const resultEl = document.getElementById("modal-detail-result");
  const searchInput = document.getElementById("modal-jm-search");

  const showDetailFor = (jmfldnmValue) => {
    const match = relevant.find(q => q.jmfldnm === jmfldnmValue.trim());
    if (!match) { resultEl.innerHTML = ""; return; }
    const detail = QUAL_DETAILS[match.jmcd];
    if (!detail || !detail.info || detail.info.length === 0) {
      resultEl.innerHTML = `<div class="fee-note">이 종목의 상세 과목정보가 아직 수집되지 않았어요. fetch_qnet.py를 --with-details 옵션으로 다시 실행해보세요.</div>`;
      return;
    }
    // 큐넷 API는 출제경향/출제기준/취득방법/응시자격 등 여러 항목을 같이 주는데,
    // 실제로 필요한 건 "시험과목 및 배점"(실제 시험 과목 정보) 뿐이라 그것만 보여준다.
    const subjectInfo = detail.info.filter(i => i.infogb === "시험과목 및 배점");
    if (subjectInfo.length === 0) {
      resultEl.innerHTML = `<div class="fee-note">이 종목은 시험과목 정보가 큐넷에 등록돼 있지 않아요.</div>`;
      return;
    }
    resultEl.innerHTML = subjectInfo.map(i => `
      <div class="detail-block">
        <span class="infogb">시험과목</span>
        ${cleanQnetText(i.contents)}
      </div>
    `).join("");
  };

  searchInput.oninput = () => showDetailFor(searchInput.value);

  // 검색어(예: "전기기능사")로 들어왔다면, 관련 종목 중 그 검색어와 가장 잘 맞는 종목을
  // 자동으로 선택해서 바로 상세정보를 보여준다. 그러면 사용자가 매번 리스트에서
  // 다시 찾아야 하는 번거로움이 없어진다.
  let preselected = "";
  if (searchQuery) {
    const q = searchQuery.trim().toLowerCase();
    const preMatch = relevant.find(qq => (qq.jmfldnm || "").toLowerCase().includes(q));
    if (preMatch) preselected = preMatch.jmfldnm;
  }
  searchInput.value = preselected;
  if (preselected) {
    showDetailFor(preselected);
  } else {
    resultEl.innerHTML = "";
  }

  document.getElementById("modal-overlay").classList.add("open");
}

function closeModal() {
  document.getElementById("modal-overlay").classList.remove("open");
}

// 쿠팡파트너스 스크립트는 innerHTML로 넣으면 브라우저가 실행해주지 않기 때문에
// (스크립트 태그는 innerHTML로 삽입되면 실행되지 않는 게 브라우저 표준 동작),
// createElement로 직접 만들어서 appendChild 해야 실제로 광고가 로드된다.
function loadCoupangAd(container) {
  const g = document.createElement("script");
  g.src = "https://ads-partners.coupang.com/g.js";
  g.onload = () => {
    const init = document.createElement("script");
    init.textContent = `new PartnersCoupang.G({"id":1009073,"template":"carousel","trackingCode":"AF5788516","width":"680","height":"140","tsource":""});`;
    container.appendChild(init);
  };
  container.appendChild(g);
}

function makeInFeedAd() {
  const wrap = document.createElement("div");
  wrap.className = "ad-slot ad-slot-infeed";
  loadCoupangAd(wrap);
  return wrap;
}

function render() {
  const q = document.getElementById("search").value.trim().toLowerCase();
  const qualgb = document.getElementById("qualgb-filter").value;
  const onlyFuture = document.getElementById("only-future").checked;
  const sortOrder = document.getElementById("sort-order").value;

  const matchingSeries = getMatchingSeries(q);

  let filtered = SCHEDULES.filter(item => {
    if (qualgb && item.qualgbCd !== qualgb) return false;
    if (onlyFuture && !hasUpcomingWithinDays(item, 15)) return false;
    if (q) {
      const hay = `${item.qualgbNmKo || ""} ${item.description || ""} ${item.implYy || ""} ${item.implSeq || ""}`.toLowerCase();
      const direct = hay.includes(q);
      const viaSeries = matchingSeries.some(s =>
        s.qualgbcd === item.qualgbCd && item.description && item.description.includes(s.seriesnm)
      );
      if (!direct && !viaSeries) return false;
    }
    return true;
  });

  const withNext = filtered.map(item => ({ item, next: pickNextEvent(item) }));

  if (sortOrder === "upcoming") {
    withNext.sort((a, b) => {
      const da = a.next ? a.next.d : Infinity;
      const db = b.next ? b.next.d : Infinity;
      return da - db;
    });
  } else {
    withNext.sort((a, b) => {
      return (b.item.implYy + b.item.implSeq).localeCompare(a.item.implYy + a.item.implSeq);
    });
  }

  const cardsEl = document.getElementById("cards");
  const emptyEl = document.getElementById("empty");
  const hintEl = document.getElementById("search-hint");
  cardsEl.innerHTML = "";

  if (withNext.length === 0) {
    emptyEl.style.display = "block";
  } else {
    emptyEl.style.display = "none";
  }

  const directHit = q && SCHEDULES.some(item => {
    const hay = `${item.qualgbNmKo || ""} ${item.description || ""}`.toLowerCase();
    return hay.includes(q);
  });
  if (q && matchingSeries.length > 0 && !directHit) {
    const names = [...new Set(matchingSeries.map(s => s.seriesnm))].join(", ");
    hintEl.style.display = "block";
    hintEl.textContent = `"${q}"의 개별 시행일정은 따로 없고, 같은 계열(${names})의 공통 시험일정으로 안내돼요. 큐넷이 종목별이 아닌 계열 단위로 일정을 제공하기 때문이에요.`;
  } else {
    hintEl.style.display = "none";
  }

  const AD_EVERY = 5;
  let cardIndex = 0;

  for (const { item, next } of withNext) {
    if (cardIndex > 0 && cardIndex % AD_EVERY === 0) {
      cardsEl.appendChild(makeInFeedAd());
    }
    cardIndex++;

    const card = document.createElement("div");
    card.className = "card";

    let ddayHtml = `<div class="dday"><div class="num">-</div><div class="sub">일정 없음</div></div>`;
    if (next) {
      let cls = "ok";
      if (next.d < 0) cls = "past";
      else if (next.d <= 7) cls = "soon";
      const label = next.d < 0 ? `${Math.abs(next.d)}일 지남` : (next.d === 0 ? "D-DAY" : `D-${next.d}`);
      ddayHtml = `<div class="dday ${cls}"><div class="num">${label}</div><div class="sub">${next.label}<br>${fmt(next.date)}</div></div>`;
    }

    card.innerHTML = `
      <div>
        <div class="desc">${item.description || ""}</div>
        ${renderTimelineBoxes(item)}
      </div>
      ${ddayHtml}
    `;
    card.addEventListener("click", () => openModal(item, q));
    cardsEl.appendChild(card);
  }
}

async function init() {
  const errorEl = document.getElementById("error-banner");
  try {
    const [schedules, meta, qualifications, qualDetails] = await Promise.all([
      loadJSON("data/schedules.json"),
      loadJSON("data/meta.json").catch(() => null),
      loadJSON("data/qualifications.json").catch(() => []),
      loadJSON("data/qual_details.json").catch(() => ({})),
    ]);
    SCHEDULES = schedules;
    QUALIFICATIONS = qualifications;
    QUAL_DETAILS = qualDetails;

    document.getElementById("modal-close").addEventListener("click", closeModal);
    document.getElementById("modal-overlay").addEventListener("click", (e) => {
      if (e.target.id === "modal-overlay") closeModal();
    });

    if (meta) {
      document.getElementById("meta-banner").textContent =
        `마지막 수집: ${new Date(meta.generated_at).toLocaleString("ko-KR")} · ${meta.years.join(", ")}년 · 자격구분 ${meta.qualgb.join(", ")}`;
    }

    const qualgbSelect = document.getElementById("qualgb-filter");
    const seen = new Map();
    for (const s of SCHEDULES) {
      if (s.qualgbCd) seen.set(s.qualgbCd, s.qualgbNmKo || s.qualgbNm || s.qualgbCd);
    }
    for (const [code, name] of seen) {
      const opt = document.createElement("option");
      opt.value = code;
      opt.textContent = name;
      qualgbSelect.appendChild(opt);
    }

    document.getElementById("search").addEventListener("input", render);
    document.getElementById("qualgb-filter").addEventListener("change", render);
    document.getElementById("sort-order").addEventListener("change", render);
    document.getElementById("only-future").addEventListener("change", render);

    render();
  } catch (e) {
    errorEl.style.display = "block";
    errorEl.innerHTML = `
      데이터를 불러오지 못했어요: ${e.message}<br>
      먼저 <code>fetch_qnet.py</code>를 실행해서 <code>data/schedules.json</code>을 만들어야 하고,
      이 페이지는 <code>python -m http.server</code>로 로컬 서버를 띄운 뒤 열어야 정상 작동해요.
    `;
  }
}

init();

if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("service-worker.js").catch(() => {});
}
</script>
